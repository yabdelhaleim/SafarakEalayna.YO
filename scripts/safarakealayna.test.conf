# Laragon virtual host — يدعم عدة مستخدمين في نفس الوقت (Apache + PHP-FPM)
# ثبّت بـ: powershell -ExecutionPolicy Bypass -File scripts/install-laragon-vhost.ps1

<VirtualHost *:80>
    DocumentRoot "C:/travile/SafarakEalayna/public"
    ServerName safarakealayna.test
    ServerAlias safarakealayna.test
    <Directory "C:/travile/SafarakEalayna/public">
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
